version: "3.9"

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 5s
      retries: 3

  honcho:
    image: ghcr.io/j1admin/honcho:latest
    container_name: honcho
    restart: unless-stopped
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  obsidian:
    image: caddy:2-alpine
    container_name: obsidian
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./obsidian:/usr/share/caddy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  webautomation:
    image: selenium/standalone-chrome:latest
    container_name: webautomation
    restart: unless-stopped
    ports:
      - "4444:4444"
      - "5900:5900"
    shm_size: "2g"
    environment:
      - SE_NO_SANDBOX=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 30s
      timeout: 5s
      retries: 3
